<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日牌意解读 | 塔罗秘境</title>
    <style>
        /* 简单美观的样式，和主页面风格统一 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", "微软雅黑", sans-serif; }
        body {
            background: linear-gradient(135deg, #fdf2f8, #fef7fb); /* 和主页面一致的弥散风渐变 */
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }
        h1 {
            color: #9f7aea; /* 和主页面一致的淡紫色 */
            margin-bottom: 20px;
            text-align: center;
        }
        .card-title {
            color: #f5a623;
            font-size: 20px;
            margin: 15px 0;
        }
        .meaning-text {
            color: #4a5568;
            line-height: 1.8;
            font-size: 16px;
            margin-bottom: 15px;
        }
        /* 返回主页面的按钮（新增动画，和抽牌页统一） */
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #fcc367;
            color: #fff !important;
            text-decoration: none !important;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.2s ease; /* 动画过渡 */
            box-shadow: 0 4px 10px rgba(252, 195, 103, 0.2); /* 轻微阴影 */
        }
        /* 鼠标悬浮：变色+上浮+阴影变大 */
        .back-btn:hover {
            background: #f5a623;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(245, 166, 35, 0.3);
        }
        /* 点击时：缩小+阴影变浅 */
        .back-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(245, 166, 35, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>「愚人牌・The Fool」</h1>
        <div class="card-title">命运解析</div>
        <p class="meaning-text">愚人牌编号0，代表着无限的可能性、全新的开始与无畏的勇气，是塔罗牌旅程的起点。它象征你正处于人生的新阶段，带着天真与热情，准备踏上未知的冒险。</p>
        <p class="meaning-text">核心启示：不必过度思虑未来的风险，你的直觉和勇气会指引方向。此刻的“不理智”，反而可能是打破僵局的关键。</p>
        <p class="meaning-text">行动建议：大胆接受新机会，放下过往的顾虑，跟随内心的冲动前行。哪怕前路未知，也请相信当下的选择就是最好的安排。</p>
        <!-- 返回主页面的按钮（链接指向抽牌页） -->
        <a href="index.html" class="back-btn">返回抽牌页</a>
    </div>
</body>
</html>
